# =============================================================================
# .github/workflows/build.yml
#
# Builds bunnydrummer/suitecrm multi-arch (amd64, arm64, arm/v7)
# usando runner nativi GitHub per arm64 e QEMU solo per arm/v7.
#
# Secrets richiesti (Settings → Secrets → Actions):
#   DOCKERHUB_USERNAME  →  bunnydrummer
#   DOCKERHUB_TOKEN     →  Docker Hub access token
# =============================================================================

name: Build & Push SuiteCRM multi-arch

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'entrypoint.sh'
      - 'apache-suitecrm.conf'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      suitecrm_version:
        description: 'SuiteCRM version (es. 8.9.0)'
        required: false
        default: '8.9.0'

env:
  IMAGE_NAME: bunnydrummer/suitecrm
  SUITECRM_VERSION: ${{ github.event.inputs.suitecrm_version || '8.9.0' }}

jobs:

  # ---------------------------------------------------------------------------
  # Build amd64 — runner nativo x86
  # ---------------------------------------------------------------------------
  build-amd64:
    name: Build amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.SUITECRM_VERSION }}-amd64
          build-args: SUITECRM_VERSION=${{ env.SUITECRM_VERSION }}
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64

  # ---------------------------------------------------------------------------
  # Build arm64 — runner nativo arm64 (no QEMU)
  # ---------------------------------------------------------------------------
  build-arm64:
    name: Build arm64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.SUITECRM_VERSION }}-arm64
          build-args: SUITECRM_VERSION=${{ env.SUITECRM_VERSION }}
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64

  # ---------------------------------------------------------------------------
  # Build arm/v7 — QEMU (Raspberry Pi 3/4 32-bit)
  # ---------------------------------------------------------------------------
  build-armv7:
    name: Build arm/v7
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (arm/v7)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm/v7
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.SUITECRM_VERSION }}-armv7
          build-args: SUITECRM_VERSION=${{ env.SUITECRM_VERSION }}
          cache-from: type=gha,scope=armv7
          cache-to: type=gha,mode=max,scope=armv7

  # ---------------------------------------------------------------------------
  # Merge manifest — unisce i 3 tag arch-specifici in un manifest multi-arch
  # ---------------------------------------------------------------------------
  merge-manifest:
    name: Merge multi-arch manifest
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64, build-armv7]
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ${{ env.IMAGE_NAME }}:${{ env.SUITECRM_VERSION }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            ${{ env.IMAGE_NAME }}:${{ env.SUITECRM_VERSION }}-amd64 \
            ${{ env.IMAGE_NAME }}:${{ env.SUITECRM_VERSION }}-arm64 \
            ${{ env.IMAGE_NAME }}:${{ env.SUITECRM_VERSION }}-armv7

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect ${{ env.IMAGE_NAME }}:latest
